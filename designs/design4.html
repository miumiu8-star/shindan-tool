<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Nude Minimal｜売上が上がらない原因診断</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-stone-100 min-h-screen py-10 px-4" style="font-weight:300;">

  <div class="max-w-lg mx-auto relative z-10">
    <!-- トップ画面 -->
    <div id="screen-top" class="bg-white border border-stone-200 rounded-xl shadow-sm p-8 text-center">
      <div class="text-5xl mb-4">✦</div>
      <h1 class="text-2xl font-bold text-stone-600 mb-3">売上が上がらない原因診断</h1>
      <p class="text-stone-500 font-light mb-6 leading-relaxed">たった5問であなたのビジネスの<br>「伸び悩みポイント」がわかります。</p>
      <button onclick="startQuiz()" class="rounded-md bg-stone-600 text-white font-normal tracking-wide px-8 py-3 hover:bg-stone-700 transition w-full">診断をはじめる</button>
    </div>
    <!-- 質問画面 -->
    <div id="screen-quiz" class="hidden bg-white border border-stone-200 rounded-xl shadow-sm p-8">
      <div class="mb-5">
        <div class="h-2 rounded-full bg-stone-200 overflow-hidden">
          <div id="progress" class="h-full bg-stone-600 transition-all" style="width:0%"></div>
        </div>
        <p id="q-count" class="text-right text-sm text-stone-600 mt-1"></p>
      </div>
      <h2 id="q-text" class="text-lg font-bold text-stone-700 font-normal mb-6"></h2>
      <div id="q-options" class="space-y-3"></div>
    </div>
    <!-- 結果画面 -->
    <div id="screen-result" class="hidden bg-white border border-stone-200 rounded-xl shadow-sm p-8 text-center">
      <div id="r-icon" class="text-5xl mb-3"></div>
      <h2 id="r-title" class="text-xl font-bold text-stone-600 mb-4"></h2>
      <p id="r-desc" class="text-stone-500 font-light leading-relaxed mb-6 text-left"></p>
      <a href="https://s.lmes.jp/landing-qr/2006793003-31EN9Bxn?uLand=xDpbWA" class="block rounded-md bg-stone-600 text-white font-normal tracking-wide px-8 py-3 hover:bg-stone-700 transition w-full">LINEで無料相談する</a>
      <button onclick="location.reload()" class="mt-4 text-sm text-stone-600 underline">もう一度診断する</button>
    </div>
  </div>
  <script>
  const questions = [
    { q: "新しいお客様と接触する機会はどのくらいありますか？",
      a: [ {t:"ほとんどない・限られている", type:"A"},
           {t:"そこそこあるが成約に繋がりにくい", type:"B"},
           {t:"接触は多いが単価が上がらない", type:"C"} ] },
    { q: "サービスの「価格」について、どう感じていますか？",
      a: [ {t:"知ってもらえれば売れるはず", type:"A"},
           {t:"価格より信頼で選ばれていない気がする", type:"B"},
           {t:"価格に見合う価値提示ができていない", type:"C"} ] },
    { q: "お客様から「なぜあなたに頼むのか？」と聞かれたら？",
      a: [ {t:"そもそも知られていない", type:"A"},
           {t:"うまく答えられない・信頼が弱い", type:"B"},
           {t:"他との違い（オファー）が曖昧", type:"C"} ] },
    { q: "過去3ヶ月で、見込み客との「次のアクション」はありましたか？",
      a: [ {t:"見込み客自体が少ない", type:"A"},
           {t:"接点はあったが関係が続かない", type:"B"},
           {t:"提案まで行くが決めきれない", type:"C"} ] },
    { q: "売上を上げるために、今もっとも力を入れていることは？",
      a: [ {t:"認知・集客を増やすこと", type:"A"},
           {t:"お客様との信頼関係づくり", type:"B"},
           {t:"商品・オファーの見直し", type:"C"} ] }
  ];
  const results = {
    A: { icon:"📣", title:"認知不足タイプ",
         desc:"あなたの伸び悩みの原因は「そもそも知られていない」こと。サービスの質は十分でも、届くべき人に届いていません。まずは接触機会を増やし、認知を広げる仕組みづくりが売上アップの近道です。" },
    B: { icon:"🤝", title:"信頼構築不足タイプ",
         desc:"あなたの伸び悩みの原因は「信頼の積み上げ不足」。接点はあっても、選ばれる理由や安心感が伝わりきっていません。関係性を育てる導線と発信で、選ばれる存在へと変わります。" },
    C: { icon:"🎯", title:"オファー設計不足タイプ",
         desc:"あなたの伸び悩みの原因は「オファー設計の弱さ」。価値や差別化が曖昧なため、最後のひと押しで決めきれていません。魅力的なオファー設計で、成約率と単価の両方が伸びます。" }
  };
  let current = 0;
  const counts = { A:0, B:0, C:0 };

  function startQuiz(){
    document.getElementById('screen-top').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');
    renderQuestion();
  }
  function renderQuestion(){
    const item = questions[current];
    document.getElementById('q-text').textContent = item.q;
    document.getElementById('q-count').textContent = 'Q' + (current+1) + ' / ' + questions.length;
    document.getElementById('progress').style.width = ((current)/questions.length*100) + '%';
    const box = document.getElementById('q-options');
    box.innerHTML = '';
    item.a.forEach(opt => {
      const btn = document.createElement('button');
      btn.textContent = opt.t;
      btn.className = "w-full text-left rounded-md border border-stone-200 bg-stone-50 hover:bg-stone-100 text-stone-600 font-light px-4 py-3 transition";
      btn.onclick = () => choose(opt.type);
      box.appendChild(btn);
    });
  }
  function choose(type){
    counts[type]++;
    current++;
    if(current < questions.length){
      renderQuestion();
    } else {
      showResult();
    }
  }
  function showResult(){
    document.getElementById('progress').style.width = '100%';
    let best = 'A', max = -1;
    ['A','B','C'].forEach(k => { if(counts[k] > max){ max = counts[k]; best = k; } });
    const r = results[best];
    document.getElementById('r-icon').textContent = r.icon;
    document.getElementById('r-title').textContent = r.title;
    document.getElementById('r-desc').textContent = r.desc;
    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');
  }
</script>
</body>
</html>
